name: Simple Java CI

on:
  push:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Compile
        run: |
          # 编译所有Java文件
          javac *.java
          echo "编译成功！"

      - name: Run simple test
        run: |
          # 运行主类
          java Main
          echo "程序执行成功！"